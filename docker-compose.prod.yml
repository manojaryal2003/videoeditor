version: "3.9"

services:
  server:
    image: ${DOCKER_USERNAME}/videoeditor-server:latest
    container_name: videoeditor-server
    restart: unless-stopped
    env_file:
      - /opt/videoeditor/server.env
    expose:
      - "5000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  client:
    image: ${DOCKER_USERNAME}/videoeditor-client:latest
    container_name: videoeditor-client
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: videoeditor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/videoeditor/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - client
      - server
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: videoeditor-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  certbot-www:
  certbot-conf:

networks:
  app-network:
    driver: bridge
