version: "3.9"

services:
  server:
    image: ${DOCKER_USERNAME}/videoeditor-server:latest
    container_name: videoeditor-server
    restart: unless-stopped
    env_file:
      - /opt/videoeditor/server.env
    expose:
      - "5000"
    networks:
      - videoeditor-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  client:
    image: ${DOCKER_USERNAME}/videoeditor-client:latest
    container_name: videoeditor-client
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - videoeditor-network

networks:
  videoeditor-network:
    driver: bridge
    name: videoeditor-network
