name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ghcr.io/manojaryal2003/videoeditor-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          build-args: |
            VITE_API_URL=https://mirajaryal.com.np
          tags: ghcr.io/manojaryal2003/videoeditor-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/mirajaryal
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u manojaryal2003 --password-stdin
            docker pull ghcr.io/manojaryal2003/videoeditor-server:latest
            docker pull ghcr.io/manojaryal2003/videoeditor-client:latest
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f